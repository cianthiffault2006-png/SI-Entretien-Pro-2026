name: SI Entretien Pro — SR Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sr-sync:
    name: SalesRabbit Sync
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Sync SalesRabbit leads
        run: |
          HTTP_STATUS=$(curl -s -L -o /tmp/sync_response.txt -w "%{http_code}" \
            --max-time 90 \
            --retry 2 \
            --retry-delay 5 \
            "${{ secrets.APP_URL }}/api/cron/sr-sync?secret=${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/sync_response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Sync failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Sync successful"
