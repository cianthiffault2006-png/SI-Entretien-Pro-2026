name: SI Entretien Pro — Jobber Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  jobber-sync:
    name: Jobber Schedule Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync Jobber schedule
        run: |
          HTTP_STATUS=$(curl -s -L -o /tmp/jobber_response.txt -w "%{http_code}" \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10 \
            -X POST "${{ secrets.APP_URL }}/api/jobber/sync" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/jobber_response.txt
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Jobber sync failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Jobber sync successful"
